<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexLabs.ai</title>

  <!-- Smooth modern font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #222;
      animation: fadeDown 1s ease;
    }

    nav h2 {
      letter-spacing: 1px;
      font-weight: 600;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.7;
      transition: 0.3s;
    }

    nav a:hover {
      opacity: 1;
      transform: translateY(-2px);
    }

    nav div {
      display: flex;
      gap: 20px;
    }

    /* HERO */
    .hero {
      padding: 140px 60px;
      text-align: left;
      animation: fadeUp 1.2s ease;
    }

    .hero h1 {
      font-size: 70px;
      font-weight: 700;
      letter-spacing: -2px;
    }

    .hero p {
      margin-top: 10px;
      opacity: 0.7;
      font-size: 16px;
    }

    .btns {
      margin-top: 30px;
    }

    button {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      padding: 12px 18px;
      margin-right: 10px;
      cursor: pointer;
      transition: 0.3s;
      border-radius: 6px;
    }

    button:hover {
      background: #fff;
      color: #000;
      transform: translateY(-3px);
    }

    /* SECTION */
    .section {
      padding: 80px 60px;
      border-top: 1px solid #222;
      animation: fadeUp 1.5s ease;
    }

    .section h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .section p {
      opacity: 0.7;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 40px;
      }

      nav {
        flex-direction: column;
        gap: 10px;
      }

      .hero, .section {
        padding: 60px 20px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <h2>NexLabs.ai</h2>
    <div>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Design</a>
      <a href="#">Lumina</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="hero">
    <h1>NexLabs.ai</h1>
    <p>AI • Apps • Websites • Graphic Design Studio</p>

    <div class="btns">
      <button>Explore Lumina</button>
      <button>Start Project</button>
    </div>
  </section>

  <section class="section">
    <h2>We build modern digital systems</h2>
    <p>Clean. Minimal. Powerful. Black & White only.</p>
  </section>

</body>
</html>
